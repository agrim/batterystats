name: BatteryStats
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    macOS: "26.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 26.0
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 1.0.3
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  BatteryStats:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Shared
      - path: Platforms/macOS/App
        excludes:
          - Resources/IconLayers/background.png
          - Resources/IconLayers/battery.png
          - Resources/IconLayers/heart.png
    dependencies:
      - target: BatteryStatsWidgetsExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: BatteryStats
        PRODUCT_BUNDLE_IDENTIFIER: io.github.agrim.batterystats
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BatteryStats
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: Platforms/macOS/App/Resources/BatteryStats.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: NO

  BatteryStatsWidgetsExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Platforms/macOS/Widgets
      - path: Shared/BatteryCore
      - path: Shared/Support/Logging
      - path: Platforms/macOS/App/Features/Battery/Data/BatteryReadingService.swift
      - path: Platforms/macOS/App/Features/Battery/Data/PowerSourceReader.swift
      - path: Platforms/macOS/App/Features/Battery/Data/PublicPowerSourceSnapshot.swift
      - path: Platforms/macOS/App/Features/Battery/Data/SmartBatteryReader.swift
    settings:
      base:
        PRODUCT_NAME: BatteryStatsWidgetsExtension
        PRODUCT_BUNDLE_IDENTIFIER: io.github.agrim.batterystats.widgets
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Platforms/macOS/Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Platforms/macOS/Widgets/BatteryStatsWidgets.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
        SWIFT_EMIT_LOC_STRINGS: NO

  BatteryStatsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/BatteryStatsTests
    dependencies:
      - target: BatteryStats
    settings:
      base:
        PRODUCT_NAME: BatteryStatsTests
        PRODUCT_BUNDLE_IDENTIFIER: io.github.agrim.batterystats.tests
        GENERATE_INFOPLIST_FILE: YES
