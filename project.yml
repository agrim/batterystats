name: BatteryStats
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  BatteryStats:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BatteryStats
    settings:
      base:
        PRODUCT_NAME: BatteryStats
        PRODUCT_BUNDLE_IDENTIFIER: com.example.BatteryStats
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: BatteryStats
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        CODE_SIGN_ENTITLEMENTS: BatteryStats/Resources/BatteryStats.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: NO

  BatteryStatsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/BatteryStatsTests
    dependencies:
      - target: BatteryStats
    settings:
      base:
        PRODUCT_NAME: BatteryStatsTests
        PRODUCT_BUNDLE_IDENTIFIER: com.example.BatteryStatsTests
        GENERATE_INFOPLIST_FILE: YES
